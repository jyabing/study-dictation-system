{% load static %}
<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <script>
        (function () {
            try {
                var savedTheme = localStorage.getItem("study_theme") || "dark";
                document.documentElement.setAttribute("data-theme", savedTheme);
            } catch (e) {
                document.documentElement.setAttribute("data-theme", "dark");
            }
        })();
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Study System{% endblock %}</title>

    <link rel="stylesheet" href="{% static 'train/css/theme.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body class="train-body {% block body_class %}{% endblock %}">

    {% block global_theme_switch %}
    <div class="global-theme-switch">
        <button id="themeToggleBtn" aria-label="切换页面风格" title="切换页面风格">
            🌙
        </button>
    </div>
    {% endblock %}

    {% block content %}{% endblock %}

    <script>
        (function () {
            var root = document.documentElement;
            var btn = document.getElementById("themeToggleBtn");

            if (!btn) return;

            function getTheme() {
                return root.getAttribute("data-theme") || "dark";
            }

            function updateLabel(theme) {
                btn.textContent = theme === "light-jp" ? "🌸" : "🌙";
                btn.setAttribute("title", theme === "light-jp" ? "切换到暗色模式" : "切换到明快模式");
                btn.setAttribute("aria-label", theme === "light-jp" ? "切换到暗色模式" : "切换到明快模式");
            }

            updateLabel(getTheme());

            btn.addEventListener("click", function () {
                var current = getTheme();
                var next = current === "light-jp" ? "dark" : "light-jp";

                root.setAttribute("data-theme", next);

                try {
                    localStorage.setItem("study_theme", next);
                } catch (e) {}

                updateLabel(next);
            });
        })();
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
    <style>
        body {
            margin: 0;
            background: #f5f6fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .page {
            max-width: 760px;
            margin: 0 auto;
            padding: 20px 12px 40px;
        }

        .card {
            background: white;
            border-radius: 18px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.06);
            padding: 20px;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 16px;
        }

        .field {
            margin-bottom: 14px;
        }

        .label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: #444;
            font-weight: 600;
        }

        .input, .textarea {
            width: 100%;
            box-sizing: border-box;
            padding: 12px 14px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            background: #fff;
        }

        .textarea {
            min-height: 120px;
            resize: vertical;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 18px;
        }

        .btn {
            border: none;
            border-radius: 10px;
            padding: 12px 16px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            text-align: center;
        }

        .btn-primary {
            background: #007bff;
            color: white;
        }

        .btn-secondary {
            background: #eef3f8;
            color: #333;
        }

        @media (max-width: 768px) {
            .actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                box-sizing: border-box;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="card">
            <div class="title">{{ page_title }}</div>

            <form method="post">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ next }}">

                {% if mode == "book" %}
                    <div class="field">
                        <label class="label">书册名称</label>
                        <input class="input" type="text" name="title" value="{{ obj.title }}" required>
                    </div>

                    <div class="field">
                        <label class="label">书册说明</label>
                        <textarea class="textarea" name="description">{{ obj.description }}</textarea>
                    </div>
                {% endif %}

                {% if mode == "lesson" %}
                    <div class="field">
                        <label class="label">章节名称</label>
                        <input class="input" type="text" name="title" value="{{ obj.title }}" required>
                    </div>

                    <div class="field">
                        <label class="label">排序</label>
                        <input class="input" type="number" name="order" value="{{ obj.order }}">
                    </div>
                {% endif %}

                {% if mode == "question" %}
                    <div class="field">
                        <label class="label">题干 / 问题</label>
                        <textarea class="textarea" name="prompt_text" required>{{ obj.prompt_text }}</textarea>
                    </div>

                    <div class="field">
                        <label class="label">标准回答</label>
                        <textarea class="textarea" name="answer_text">{{ obj.answer_text }}</textarea>
                    </div>

                    <div class="field">
                        <label class="label">音频地址（可不填）</label>
                        <input class="input" type="text" name="audio_url" value="{{ obj.audio_url }}">
                    </div>
                {% endif %}

                <div class="actions">
                    <button type="submit" class="btn btn-primary">保存修改</button>
                    <a href="{{ next }}" class="btn btn-secondary">返回</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>

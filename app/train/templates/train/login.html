<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录</title>
    <style>
        body {
            margin: 0;
            background: #f5f6fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: white;
            border-radius: 18px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            padding: 24px;
            box-sizing: border-box;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #222;
        }

        .sub {
            font-size: 13px;
            color: #777;
            margin-bottom: 20px;
        }

        .field {
            margin-bottom: 14px;
        }

        .label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: #444;
        }

        .input {
            width: 100%;
            box-sizing: border-box;
            padding: 12px 14px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
        }

        .input:focus {
            outline: none;
            border-color: #007bff;
        }

        .btn {
            width: 100%;
            border: none;
            background: #007bff;
            color: white;
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            margin-top: 4px;
        }

        .btn:hover {
            opacity: 0.92;
        }

        .error {
            background: #fff2f2;
            color: #c62828;
            border: 1px solid #ffd7d7;
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 13px;
            margin-bottom: 14px;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="card">
            <div class="title">登录</div>
            <div class="sub">登录后查看自己的书册与背诵循环记忆</div>

            {% if form.errors %}
                <div class="error">
                    用户名或密码不正确，请重新输入。
                </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}

                <div class="field">
                    <label class="label" for="id_username">用户名</label>
                    <input
                        type="text"
                        name="username"
                        id="id_username"
                        class="input"
                        placeholder="请输入用户名"
                        required
                    >
                </div>

                <div class="field">
                    <label class="label" for="id_password">密码</label>
                    <input
                        type="password"
                        name="password"
                        id="id_password"
                        class="input"
                        placeholder="请输入密码"
                        required
                    >
                </div>

                {% if next %}
                    <input type="hidden" name="next" value="{{ next }}">
                {% endif %}

                <button type="submit" class="btn">登录</button>
            </form>
        </div>
    </div>
</body>
</html>

{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密码修改成功</title>
    <link rel="stylesheet" href="{% static 'train/css/theme.css' %}">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #eef4ff 0%, #f8fbff 100%);
            font-family: "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif;
        }

        .done-page {
            max-width: 680px;
            margin: 48px auto;
            padding: 0 16px 32px;
        }

        .done-card {
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid rgba(148, 163, 184, 0.20);
            border-radius: 24px;
            padding: 28px;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
        }

        .done-title {
            margin: 0 0 10px;
            font-size: 30px;
            font-weight: 800;
            color: #163a70;
        }

        .done-text {
            margin: 0;
            color: #5b6b88;
            font-size: 15px;
            line-height: 1.8;
        }

        .done-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 24px;
        }

        .done-action {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            padding: 0 18px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 700;
        }

        .done-action.primary {
            background: #1d4ed8;
            color: #ffffff;
        }

        .done-action.secondary {
            background: #ffffff;
            color: #1e3a5f;
            border: 1px solid rgba(148, 163, 184, 0.35);
        }

        @media (max-width: 640px) {
            .done-page {
                margin-top: 28px;
            }

            .done-card {
                padding: 20px;
                border-radius: 18px;
            }

            .done-title {
                font-size: 24px;
            }

            .done-action {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="done-page">
        <div class="done-card">
            <h1 class="done-title">密码已修改成功</h1>
            <p class="done-text">你的账号密码已经更新。接下来可以返回今日学习继续使用，也可以去学习统计页面查看进度。</p>

            <div class="done-actions">
                <a href="{% url 'dashboard' %}" class="done-action primary">返回今日学习</a>
                <a href="{% url 'stats-page' %}" class="done-action secondary">打开学习统计</a>
            </div>
        </div>
    </div>
</body>
</html>

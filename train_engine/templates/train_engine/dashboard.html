<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>学习训练中心</title>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial, sans-serif;
    margin:0;
    padding:40px 20px;
}

h1{
    text-align:center;
    margin-bottom:40px;
}

/* 卡片容器 */

.panel{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    max-width:900px;
    margin:auto;
}

/* 卡片 */

.card{

    background:#1e1e1e;
    border:1px solid #444;
    border-radius:12px;

    padding:30px 20px;

    text-align:center;

    transition:0.2s;
}

.card:hover{
    background:#333;
    transform:scale(1.03);
}

/* 链接 */

.card a{

    color:white;
    text-decoration:none;
    display:block;
}

/* 图标 */

.icon{
    font-size:40px;
    margin-bottom:12px;
}

/* 标题 */

.title{
    font-size:20px;
}

/* 手机优化 */

@media (max-width:600px){

body{
    padding:20px 10px;
}

h1{
    font-size:24px;
}

.card{
    padding:25px 15px;
}

.icon{
    font-size:36px;
}

.title{
    font-size:18px;
}

}

</style>

</head>

<body>

<h1>📚 学习训练中心</h1>

<div class="panel">

<div class="card">
<a href="/dictation/">
<div class="icon">🎧</div>
<div class="title">听写训练</div>
</a>
</div>

<div class="card">
<a href="/question-train/">
<div class="icon">🧠</div>
<div class="title">多题型训练</div>
</a>
</div>

<div class="card">
<a href="/courses/">
<div class="icon">📚</div>
<div class="title">课程管理</div>
</a>
</div>

<div class="card">
<a href="/dictation/?mode=wrong">
<div class="icon">❌</div>
<div class="title">错题复习</div>
</a>
</div>

<div class="card">
<a href="/dictation/?mode=review">
<div class="icon">📅</div>
<div class="title">今日复习</div>
</a>
</div>

<div class="card">
<a href="/admin/">
<div class="icon">⚙️</div>
<div class="title">题库管理</div>
</a>
</div>

</div>

</body>
</html>

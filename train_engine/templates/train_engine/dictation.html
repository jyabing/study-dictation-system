<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Dictation Training</title>

<style>

body{
    background:#111;
    color:#eee;
    font-family:Arial;
    padding:40px;
}

input,select{
    padding:8px;
    font-size:16px;
}

button{
    padding:8px 14px;
    margin:5px;
    cursor:pointer;
}

.correct{
    color:lightgreen;
    font-weight:bold;
}

.wrong{
    color:#ff6b6b;
    font-weight:bold;
}

.correct-word{
    color:#ddd;
}

.missing{
    color:red;
    text-decoration:underline;
    font-weight:bold;
}

.extra{
    color:orange;
    font-weight:bold;
}

#panel{
    margin-top:20px;
    padding:20px;
    border:1px solid #444;
    max-width:700px;
}

#prompt{
    margin:15px 0;
    font-size:18px;
}

#result{
    margin-top:15px;
    font-size:18px;
    line-height:1.8;
}

#score{
    margin-top:10px;
    font-size:18px;
    font-weight:bold;
}

</style>
</head>

<body>

<h2>🎧 Dictation Training</h2>

<label>Lesson ID:
<input id="lessonId" value="1"/>
</label>

<button onclick="loadLesson()">Load Lesson</button>

<div id="score">Score: 0 / 0</div>

<div id="panel" style="display:none;">

<div id="progress"></div>

<div id="prompt">Click ▶ to listen</div>

<button onclick="playAudio()">▶ Play</button>

<select id="speed">
<option value="0.7">Slow</option>
<option value="0.9" selected>Normal</option>
<option value="1.1">Fast</option>
</select>

<br><br>

<input id="answer" style="width:500px;" placeholder="Type what you hear..."/>

<button onclick="submitAnswer()">Submit</button>

<div id="result"></div>

<button onclick="nextQ()">Next</button>

</div>


<script>

let sentences = [];
let idx = 0;
let currentText = "";

let correctCount = 0;


// =======================
// 文本标准化
// =======================

function normalizeText(s){

    return s
        .toLowerCase()
        .replace(/[^\w\s]/g,"")
        .replace(/\s+/g," ")
        .trim();
}


// =======================
// diff 算法
// =======================

function buildDiff(expected,user){

    const ew = normalizeText(expected).split(" ");
    const uw = normalizeText(user).split(" ");

    const result = [];

    const max = Math.max(ew.length,uw.length);

    for(let i=0;i<max;i++){

        const e = ew[i];
        const u = uw[i];

        if(e!==undefined && u!==undefined){

            if(e===u){

                result.push({word:e,status:"correct"});

            }else{

                result.push({word:e,status:"missing"});
                result.push({word:u,status:"extra"});

            }

        }

        else if(e!==undefined){

            result.push({word:e,status:"missing"});

        }

        else if(u!==undefined){

            result.push({word:u,status:"extra"});

        }

    }

    return result;

}


// =======================
// 更新分数
// =======================

function updateScore(){

document.getElementById("score").innerText =
`Score: ${correctCount} / ${sentences.length}`;

}


// =======================
// 播放语音
// =======================

function playAudio(){

const msg = new SpeechSynthesisUtterance(currentText);

msg.lang="en-US";

msg.rate=parseFloat(document.getElementById("speed").value);

window.speechSynthesis.speak(msg);

}


// =======================
// 加载 lesson
// =======================

async function loadLesson(){

const lessonId = document.getElementById("lessonId").value;

const res = await fetch(`/lesson/${lessonId}/sentences/`);

const data = await res.json();

sentences = data.sentences;

idx=0;
correctCount=0;

document.getElementById("panel").style.display="block";

updateScore();

showQ();

}


// =======================
// 显示题目
// =======================

function showQ(){

if(idx>=sentences.length){

document.getElementById("prompt").innerText="🎉 Finished!";
document.getElementById("progress").innerText="";
return;

}

currentText = sentences[idx].text_en;

document.getElementById("progress").innerText =
`Question ${idx+1} / ${sentences.length}`;

document.getElementById("prompt").innerText =
"Click ▶ to listen";

document.getElementById("answer").value="";
document.getElementById("result").innerHTML="";

}


// =======================
// 提交答案
// =======================

async function submitAnswer(){

const s = sentences[idx];

const userInput = document.getElementById("answer").value;

const form = new FormData();

form.append("sentence_id",s.id);
form.append("user_input",userInput);

const res = await fetch("/api/train/check/",{

method:"POST",
body:form

});

const data = await res.json();


// ===== 正确 =====

if(data.correct){

correctCount++;

document.getElementById("result").innerHTML =
"<span class='correct'>✔ Correct</span>";

updateScore();

setTimeout(()=>{

nextQ();

},1200);

}


// ===== 错误 =====

else{

const expected = data.expected;

const diff = buildDiff(expected,userInput);

let html="<span class='wrong'>✖ Wrong</span><br><br>";

html+="Expected:<br>";

diff.forEach(w=>{

if(w.status==="correct"){

html+=`<span class="correct-word">${w.word}</span> `;

}

else if(w.status==="missing"){

html+=`<span class="missing">${w.word}</span> `;

}

else if(w.status==="extra"){

html+=`<span class="extra">${w.word}</span> `;

}

});

document.getElementById("result").innerHTML=html;

// ❗错误不自动跳题

}

}


// =======================
// 下一题
// =======================

function nextQ(){

idx++;

showQ();

}


// =======================
// Enter 提交
// =======================

document.getElementById("answer").addEventListener("keypress",function(e){

if(e.key==="Enter"){

submitAnswer();

}

});


</script>

</body>
</html>

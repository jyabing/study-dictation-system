<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>Dictation Training</title>

    <style>
        body{
            background:#111;
            color:#eee;
            font-family:Arial, sans-serif;
            padding:40px;
        }

        h2{
            margin-bottom:20px;
        }

        input, select{
            padding:8px;
            font-size:16px;
        }

        button{
            padding:8px 14px;
            margin:5px;
            cursor:pointer;
            font-size:16px;
        }

        .correct{
            color:lightgreen;
            font-weight:bold;
        }

        .wrong{
            color:#ff6b6b;
            font-weight:bold;
        }

        .missing{
            color:#ff4d4f;
            text-decoration:underline;
            font-weight:bold;
        }

        .extra{
            color:orange;
            font-weight:bold;
        }

        .correct-word{
            color:#ddd;
        }

        #panel{
            margin-top:20px;
            padding:20px;
            border:1px solid #444;
            max-width:700px;
        }

        #prompt{
            margin:15px 0;
            font-size:18px;
        }

        #result{
            margin-top:15px;
            font-size:18px;
            line-height:1.8;
        }

        #score, #wrongCount{
            margin-top:10px;
            font-size:18px;
            font-weight:bold;
        }

        #controls{
            margin-top:10px;
            margin-bottom:10px;
        }

        #answer{
            width:520px;
        }

        .section{
            margin-bottom:15px;
        }

        .small-note{
            color:#aaa;
            font-size:14px;
        }
    </style>
</head>

<body>

<h2>🎧 Dictation Training</h2>

<div class="section">
    <label>Lesson ID:
        <input id="lessonId" value="1"/>
    </label>
    <button onclick="loadLesson()">Load Lesson</button>
</div>

<div id="score">Score: 0 / 0</div>
<div id="wrongCount">Wrong Count: 0</div>

<div id="panel" style="display:none;">

    <div id="progress"></div>

    <div id="prompt">Click ▶ to listen</div>

    <div id="controls">
        <button onclick="playAudio()">▶ Play</button>
        <button onclick="repeatAudio()">🔁 Repeat</button>

        <label style="margin-left:10px;">
            Speed:
            <select id="speed">
                <option value="0.7">Slow</option>
                <option value="0.9" selected>Normal</option>
                <option value="1.1">Fast</option>
            </select>
        </label>
    </div>

    <br>

    <input id="answer" placeholder="Type what you hear..."/>
    <button onclick="submitAnswer()">Submit</button>

    <div id="result"></div>

    <button onclick="nextQ()">Next</button>

    <div class="small-note" style="margin-top:12px;">
        Tip: Press Enter to submit.
    </div>

</div>


<script>
    let sentences = [];
    let idx = 0;
    let currentText = "";

    let correctCount = 0;
    let wrongCount = 0;
    let answeredCurrent = false;

    // ===============================
    // 文本标准化
    // ===============================
    function normalizeText(s){
        return s
            .toLowerCase()
            .replace(/[^\w\s]/g, "")
            .replace(/\s+/g, " ")
            .trim();
    }

    // ===============================
    // 生成 diff（前端自己做，避免后端复杂性）
    // ===============================
    function buildDiff(expected, userInput){
        const expectedWords = normalizeText(expected).split(" ").filter(Boolean);
        const userWords = normalizeText(userInput).split(" ").filter(Boolean);

        const result = [];
        const maxLen = Math.max(expectedWords.length, userWords.length);

        for(let i = 0; i < maxLen; i++){
            const ew = expectedWords[i];
            const uw = userWords[i];

            if(ew !== undefined && uw !== undefined){
                if(ew === uw){
                    result.push({ word: ew, status: "correct" });
                }else{
                    result.push({ word: ew, status: "missing" });
                    result.push({ word: uw, status: "extra" });
                }
            }else if(ew !== undefined){
                result.push({ word: ew, status: "missing" });
            }else if(uw !== undefined){
                result.push({ word: uw, status: "extra" });
            }
        }

        return result;
    }

    // ===============================
    // 更新分数显示
    // ===============================
    function updateScore(){
        document.getElementById("score").innerText =
            `Score: ${correctCount} / ${sentences.length}`;

        document.getElementById("wrongCount").innerText =
            `Wrong Count: ${wrongCount}`;
    }

    // ===============================
    // 语音播放
    // ===============================
    function playAudio(){
        if(!currentText) return;

        window.speechSynthesis.cancel();

        const msg = new SpeechSynthesisUtterance(currentText);
        msg.lang = "en-US";
        msg.rate = parseFloat(document.getElementById("speed").value || "0.9");
        window.speechSynthesis.speak(msg);
    }

    function repeatAudio(){
        playAudio();
    }

    // ===============================
    // 加载 Lesson
    // ===============================
    async function loadLesson(){
        const lessonId = document.getElementById("lessonId").value;

        const res = await fetch(`/lesson/${lessonId}/sentences/`);
        const data = await res.json();

        sentences = data.sentences || [];
        idx = 0;
        correctCount = 0;
        wrongCount = 0;
        answeredCurrent = false;

        document.getElementById("panel").style.display = "block";

        updateScore();
        showQ();
    }

    // ===============================
    // 显示当前题目
    // ===============================
    function showQ(){
        if(idx >= sentences.length){
            document.getElementById("prompt").innerText = "🎉 Finished!";
            document.getElementById("progress").innerText = "";
            document.getElementById("result").innerHTML =
                `<span class="correct">Finished! Final Score: ${correctCount} / ${sentences.length}</span>`;
            document.getElementById("answer").value = "";
            return;
        }

        currentText = sentences[idx].text_en;
        answeredCurrent = false;

        document.getElementById("progress").innerText =
            `Question ${idx + 1} / ${sentences.length}`;

        document.getElementById("prompt").innerText =
            "Click ▶ to listen";

        document.getElementById("answer").value = "";
        document.getElementById("result").innerHTML = "";
    }

    // ===============================
    // 提交答案
    // ===============================
    async function submitAnswer(){
        if(idx >= sentences.length) return;

        const s = sentences[idx];
        const userInput = document.getElementById("answer").value;

        const form = new FormData();
        form.append("sentence_id", s.id);
        form.append("user_input", userInput);

        const res = await fetch("/api/train/check/", {
            method: "POST",
            body: form
        });

        const data = await res.json();

        if(data.error){
            document.getElementById("result").innerHTML =
                `<span class="wrong">Error: ${data.error}</span>`;
            return;
        }

        if(data.correct){
            if(!answeredCurrent){
                correctCount++;
                answeredCurrent = true;
            }

            document.getElementById("result").innerHTML =
                "<span class='correct'>✔ Correct</span>";

            updateScore();

            setTimeout(()=>{
                nextQ();
            }, 1200);

        }else{
            if(!answeredCurrent){
                wrongCount++;
                answeredCurrent = true;
            }

            const expectedText = data.expected || "";
            const diff = buildDiff(expectedText, userInput);

            let html = "<span class='wrong'>✖ Wrong</span><br><br>";
            html += "Expected:<br>";

            if(diff.length === 0){
                html += expectedText;
            }else{
                diff.forEach(w=>{
                    if(w.status === "correct"){
                        html += `<span class="correct-word">${w.word}</span> `;
                    }
                    else if(w.status === "missing"){
                        html += `<span class="missing">${w.word}</span> `;
                    }
                    else if(w.status === "extra"){
                        html += `<span class="extra">${w.word}</span> `;
                    }
                });
            }

            document.getElementById("result").innerHTML = html;

            updateScore();

            setTimeout(()=>{
                nextQ();
            }, 1800);
        }
    }

    // ===============================
    // 下一题
    // ===============================
    function nextQ(){
        idx++;
        showQ();
    }

    // ===============================
    // Enter 键提交
    // ===============================
    document.addEventListener("DOMContentLoaded", function(){
        document.getElementById("answer").addEventListener("keypress", function(e){
            if(e.key === "Enter"){
                submitAnswer();
            }
        });
    });
</script>

</body>
</html>

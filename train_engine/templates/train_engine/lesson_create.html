<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>新增章节</title>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial;
    padding:30px;
}

.container{
    max-width:600px;
    margin:auto;
}

h1{
    margin-bottom:20px;
}

label{
    display:block;
    margin-top:15px;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;

    background:#222;
    border:1px solid #444;
    color:white;
}

button{
    margin-top:20px;
    padding:10px 16px;
    cursor:pointer;
}

/* 手机卡片 */

@media(max-width:700px){

.container{
    background:#1e1e1e;
    padding:20px;
    border-radius:8px;
}

}

</style>

</head>

<body>

<div class="container">

<h1>新增章节</h1>

<p>课程：{{course.name}}</p>

<form method="post">

{% csrf_token %}

<label>
章节名称
<input type="text" name="title" required>
</label>

<label>
排序
<input type="number" name="order" value="0">
</label>

<button type="submit">
保存章节
</button>

</form>

</div>

</body>
</html>

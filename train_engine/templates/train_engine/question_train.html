<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>多题型训练</title>

<style>

body{
background:#111;
color:#eee;
font-family:Arial;
padding:30px;
}

input,select,button{
padding:10px;
font-size:16px;
margin:5px;
}

#panel{
margin-top:20px;
padding:20px;
border:1px solid #444;
max-width:900px;
}

#prompt{
font-size:22px;
margin:15px 0;
}

.option-item{
margin:8px 0;
}

.correct{
color:#7CFC00;
}

.wrong{
color:#ff6b6b;
}

.hidden{
display:none;
}

@media(max-width:700px){

body{
padding:15px;
}

input{
width:100%;
}

#panel{
max-width:100%;
}

}

</style>

</head>

<body>

<h2>🧠 多题型训练</h2>

<label>课程ID：
<input id="lessonId" value="1">
</label>

<label>题型：
<select id="qtypeFilter">
<option value="">全部</option>
<option value="qa">问答题</option>
<option value="cloze">挖空题</option>
<option value="choice">选择题</option>
<option value="listening">听力题</option>
<option value="speaking">口语题</option>
</select>
</label>

<label>语言：
<select id="speechLang">
<option value="auto">自动识别</option>
<option value="en">English</option>
<option value="ja">日本語</option>
<option value="zh">中文</option>
</select>
</label>

<button onclick="loadQuestions()">加载题目</button>

<div id="score">成绩：0 / 0</div>

<div id="panel" class="hidden">

<div id="progress"></div>
<div id="meta"></div>

<div id="prompt"></div>

<div id="audioControls" class="hidden">
<button onclick="playPrompt()">▶ 播放</button>

<select id="speed">
<option value="0.7">慢速</option>
<option value="1" selected>正常</option>
<option value="1.2">快速</option>
</select>
</div>

<div id="options"></div>

<input id="answer" placeholder="请输入答案">

<div id="speakingBox" class="hidden">

<button onclick="startRecording()">🎤开始录音</button>
<button onclick="stopRecording()">■停止录音</button>

<div id="recordStatus"></div>

</div>

<button onclick="submitAnswer()">提交</button>
<button onclick="nextQuestion()">下一题</button>

<div id="result"></div>

</div>

<script>

let questions=[]
let idx=0
let correct=0
let currentQuestion=null

let mediaRecorder
let audioChunks=[]

function updateScore(){

document.getElementById("score").innerText=
"成绩："+correct+" / "+questions.length

}

async function loadQuestions(){

const lesson=document.getElementById("lessonId").value
const type=document.getElementById("qtypeFilter").value

let url="/lesson/"+lesson+"/questions/"

if(type){
url+="?qtype="+type
}

const res=await fetch(url)
const data=await res.json()

questions=data.questions||[]

idx=0
correct=0

updateScore()

document.getElementById("panel").classList.remove("hidden")

showQuestion()

}

function showQuestion(){

document.getElementById("result").innerHTML=""
document.getElementById("options").innerHTML=""
document.getElementById("answer").value=""

document.getElementById("audioControls").classList.add("hidden")
document.getElementById("speakingBox").classList.add("hidden")

if(idx>=questions.length){

document.getElementById("prompt").innerText="🎉 本轮完成"

return

}

currentQuestion=questions[idx]

document.getElementById("progress").innerText=
"第 "+(idx+1)+" / "+questions.length+" 题"

document.getElementById("meta").innerText=
"题型："+currentQuestion.qtype

if(currentQuestion.qtype==="listening"){

document.getElementById("prompt").innerText=
"🎧 请听音频并输入内容"

document.getElementById("audioControls").classList.remove("hidden")

}

else{

document.getElementById("prompt").innerText=
currentQuestion.question

}

if(currentQuestion.qtype==="choice"){

renderChoice(currentQuestion)

}

if(currentQuestion.qtype==="speaking"){

document.getElementById("speakingBox").classList.remove("hidden")

}

}

function renderChoice(q){

let html=""

q.options.forEach((opt,i)=>{

html+=`
<div class="option-item">
<label>
<input type="radio" name="opt" value="${opt.text}">
${String.fromCharCode(65+i)}. ${opt.text}
</label>
</div>
`

})

document.getElementById("options").innerHTML=html

}

function playPrompt(){

let text=currentQuestion.question

const msg=new SpeechSynthesisUtterance(text)

const lang=document.getElementById("speechLang").value

if(lang==="ja") msg.lang="ja-JP"
else if(lang==="zh") msg.lang="zh-CN"
else msg.lang="en-US"

msg.rate=parseFloat(document.getElementById("speed").value)

speechSynthesis.cancel()
speechSynthesis.speak(msg)

}

async function startRecording(){

audioChunks=[]

const stream=await navigator.mediaDevices.getUserMedia({audio:true})

mediaRecorder=new MediaRecorder(stream)

mediaRecorder.ondataavailable=e=>{
audioChunks.push(e.data)
}

mediaRecorder.start()

document.getElementById("recordStatus").innerText="录音中..."

}

async function stopRecording(){

mediaRecorder.stop()

mediaRecorder.onstop=async()=>{

document.getElementById("recordStatus").innerText="识别中..."

const blob=new Blob(audioChunks,{type:"audio/webm"})

const form=new FormData()

form.append("audio",blob)

const lang=document.getElementById("speechLang").value
form.append("lang",lang)

const res=await fetch("/api/train/transcribe/",{
method:"POST",
body:form
})

const data=await res.json()

document.getElementById("answer").value=data.text||""

document.getElementById("recordStatus").innerText="识别完成"

if(currentQuestion.qtype==="speaking"){

scoreSpeaking(data.text)

}

}

}

async function scoreSpeaking(text){

const form=new FormData()

form.append("text",text)
form.append("expected",currentQuestion.answer||"")

const res=await fetch("/api/train/score-speaking/",{
method:"POST",
body:form
})

const score=await res.json()

if(!score.error){

document.getElementById("result").innerHTML=`

<div class="correct">语音识别：${text}</div>

Accuracy: ${score.accuracy}<br>
Fluency: ${score.fluency}<br>
Pronunciation: ${score.pronunciation}<br>
Grammar: ${score.grammar}<br>

Suggestion: ${score.suggestion}

`

}

}

async function submitAnswer(){

const form=new FormData()

form.append("question_id",currentQuestion.id)

if(currentQuestion.qtype==="choice"){

const sel=document.querySelector('input[name="opt"]:checked')

if(sel){
form.append("user_input",sel.value)
}

}
else{

form.append("user_input",
document.getElementById("answer").value)

}

const res=await fetch("/api/train/check_question/",{
method:"POST",
body:form
})

const data=await res.json()

if(data.correct){

correct++

updateScore()

document.getElementById("result").innerHTML=
"<div class='correct'>✔ 正确</div>"

}
else{

document.getElementById("result").innerHTML=
"<div class='wrong'>✘ 错误</div><br>正确答案："+data.expected

}

}

function nextQuestion(){

idx++

showQuestion()

}

</script>

</body>
</html>

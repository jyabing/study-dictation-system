<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>题目管理</title>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial;
    padding:30px;
}

.container{
    max-width:1000px;
    margin:auto;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:10px;
    border-bottom:1px solid #333;
}

.card{
    background:#1e1e1e;
    padding:15px;
    margin-bottom:12px;
    border-radius:6px;
}

button{
    padding:6px 12px;
    cursor:pointer;
}

@media(max-width:700px){

table{
    display:none;
}

}

</style>

</head>

<body>

<div class="container">

<h2>句子</h2>

<p>{{sentence.text}}</p>

<p>{{sentence.translation}}</p>

<br>

<h2>题目列表</h2>

<button onclick="location.href='/question/create/{{sentence.id}}/'">
新增题目
</button>

<br><br>

<table>

<tr>
<th>题型</th>
<th>题目</th>
<th>答案</th>
<th>操作</th>
</tr>

{% for q in questions %}

<tr>

<td>{{q.qtype}}</td>

<td>{{q.question}}</td>

<td>{{q.answer}}</td>

<td>
<button onclick="location.href='/question/{{q.id}}/edit/'">
编辑
</button>

<button onclick="location.href='/question/{{q.id}}/delete/'">
删除
</button>
</td>

</tr>

{% endfor %}

</table>

<!-- 手机 -->

{% for q in questions %}

<div class="card">

<p><b>题型：</b>{{q.qtype}}</p>

<p>{{q.question}}</p>

<p><b>答案：</b>{{q.answer}}</p>

<button onclick="location.href='/question/{{q.id}}/edit/'">
编辑
</button>

<button onclick="location.href='/question/{{q.id}}/delete/'">
删除
</button>

</div>

{% endfor %}
